---
- name: Install Vulkan loader and dev tools
  ansible.builtin.dnf:
    name:
      - vulkan-loader
      - vulkan-loader-devel
      - vulkan-headers
      - vulkan-validation-layers
      - glslang
      - glslang-devel
      - spirv-tools
      - spirv-tools-devel
      - spirv-headers-devel
    state: present

- name: Install NVIDIA driver libs for Vulkan ICD
  ansible.builtin.dnf:
    name: nvidia-driver-libs
    state: present
    install_weak_deps: false

- name: Remove orphaned packages
  ansible.builtin.dnf:
    autoremove: true

- name: Create Vulkan ICD directory
  ansible.builtin.file:
    path: /etc/vulkan/icd.d
    state: directory
    mode: '0755'

- name: Get NVIDIA driver version
  ansible.builtin.command:
    cmd: nvidia-smi --query-gpu=driver_version --format=csv,noheader
  register: nvidia_driver_ver
  changed_when: false

- name: Write NVIDIA Vulkan ICD
  ansible.builtin.copy:
    dest: /etc/vulkan/icd.d/nvidia_icd.json
    mode: '0644'
    content: |
      {
          "file_format_version" : "1.0.0",
          "ICD": {
              "library_path": "libGLX_nvidia.so.0",
              "api_version" : "1.3"
          }
      }

- name: Install shaderc build dependencies
  ansible.builtin.dnf:
    name:
      - git
      - cmake
      - ninja-build
      - python3
    state: present

- name: Clone shaderc
  ansible.builtin.git:
    repo: https://github.com/google/shaderc
    dest: "{{ shaderc_build_dir }}"
    depth: 1

- name: Sync shaderc dependencies
  ansible.builtin.command:
    cmd: python3 utils/git-sync-deps
    chdir: "{{ shaderc_build_dir }}"
  changed_when: true

- name: Configure shaderc
  ansible.builtin.command:
    cmd: >
      cmake ..
      -GNinja
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=/usr/local
      -DSHADERC_SKIP_TESTS=ON
      -DSHADERC_SKIP_EXAMPLES=ON
      -DSHADERC_ENABLE_SHARED_CRT=ON
    chdir: "{{ shaderc_build_dir }}"
    creates: "{{ shaderc_build_dir }}/build/build.ninja"
  args:
    chdir: "{{ shaderc_build_dir }}/build"

- name: Build and install shaderc
  ansible.builtin.shell:
    cmd: ninja -j$(nproc) && ninja install
    chdir: "{{ shaderc_build_dir }}/build"
  changed_when: true

- name: Update ldconfig after shaderc
  ansible.builtin.command:
    cmd: ldconfig
  changed_when: true

- name: Remove shaderc build directory
  ansible.builtin.file:
    path: "{{ shaderc_build_dir }}"
    state: absent

- name: Install slang build dependencies
  ansible.builtin.dnf:
    name:
      - libxml2-devel
      - curl-devel
    state: present

- name: Clone slang
  ansible.builtin.git:
    repo: https://github.com/shader-slang/slang
    dest: "{{ slang_build_dir }}"
    recursive: true

- name: Configure slang
  ansible.builtin.command:
    cmd: >
      cmake ..
      -GNinja
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=/usr/local
      -DCMAKE_CXX_FLAGS="-w -Wno-error -DVK_USE_PLATFORM_HEADLESS_EXT"
      -DCMAKE_C_FLAGS="-w -Wno-error -DVK_USE_PLATFORM_HEADLESS_EXT"
      -DSLANG_ENABLE_TESTS=OFF
      -DSLANG_ENABLE_EXAMPLES=OFF
      -DSLANG_ENABLE_GFX=OFF
      -DSLANG_ENABLE_SLANGD=OFF
      -DSLANG_ENABLE_SLANG_RHI=OFF
      -DSLANG_SLANG_LLVM_FLAVOR=DISABLE
    chdir: "{{ slang_build_dir }}/build"
  changed_when: true

- name: Build and install slang
  ansible.builtin.shell:
    cmd: ninja -j$(nproc) && ninja install
    chdir: "{{ slang_build_dir }}/build"
  changed_when: true

- name: Update ldconfig after slang
  ansible.builtin.command:
    cmd: ldconfig
  changed_when: true

- name: Remove slang build directory
  ansible.builtin.file:
    path: "{{ slang_build_dir }}"
    state: absent
